name: ecoshop
description: "EcoShop - Next-Generation Multi-Platform E-Commerce Solution"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^9.1.0
  equatable: ^2.0.7
  rxdart: ^0.27.7

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^15.1.2

  # UI & Design
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  smooth_page_indicator: ^1.2.0+3
  flutter_staggered_animations: ^1.1.1
  animations: ^2.0.11
  lottie: ^3.3.1

  # Storage
  shared_preferences: ^2.5.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.4

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  logger: ^2.5.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  firebase_messaging: ^15.2.10
  image_picker: ^1.2.1
  flutter_stripe: ^12.5.0
  flutter_local_notifications: ^21.0.0
  flutter_dotenv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  flutter_animate: ^4.5.2

  # AI & Premium Features
  google_generative_ai: ^0.4.4
  sentry_flutter: ^8.11.0
  envied: ^1.0.1
  flutter_localizations:
    sdk: flutter



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.15
  envied_generator: ^1.0.1


flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#2E7D32" # Eco Green
  image: assets/images/logo_splash.png
  android_12:
    color: "#2E7D32"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#2E7D32"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
